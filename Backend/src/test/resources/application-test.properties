# ============================================
# RFO Test Environment Configuration
# Uses H2 in-memory database (MySQL compatibility mode)
# ============================================

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Schema and Data Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/schema.sql
spring.sql.init.data-locations=classpath:sql/test-data.sql

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath*:mapper/*.xml
mybatis-plus.type-aliases-package=com.unimelb.swen90017.rfo.pojo
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JWT Configuration (test-only secret)
jwt.secret=test-secret-key-for-unit-testing-only-do-not-use-in-production-1234567890
jwt.expiration=86400000

# Server Configuration
server.port=0
server.servlet.context-path=/rfo

# Logging (reduced noise during tests)
logging.level.com.unimelb.swen90017.rfo=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
